spring.application.name=ai-coding

# ===== ????MySQL? =====
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/notification?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your_password

# ????HikariCP?Spring Boot ???
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ===== JPA =====
# ????? update ???????????? validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== RocketMQ =====
rocketmq.name-server=127.0.0.1:9876
rocketmq.producer.group=notification-producer-group
# ??????????? group?????? producer group ???
rocketmq.producer.send-message-timeout=3000

# ===== ???? Topic =====
notification.rocketmq.topic=notification-topic
notification.rocketmq.consumer-group=notification-consumer-group
# ???????? HTTP ??????
notification.rocketmq.consume-thread-number=20

# ===== ?????????????????/???? =====
notification.scheduler.interval-ms=60000
